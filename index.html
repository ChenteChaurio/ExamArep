<!doctype html>
<html>
  <head>
    <title>Math Client</title>
  </head>
  <body>
    <h2>Secuencia de Lucas</h2>

    <input type="number" id="inputLucas" />
    <button onclick="callFactor()">Calcular secuencia de lucas</button>

    <p id="resultado"></p>

    <script>
      function callFactor() {
        let n = document.getElementById("inputLucas").value;

        fetch("http://ec2-32-192-227-254.compute-1.amazonaws.com:8080/lucasseq?value=" + n)
          .then((res) => res.text())
          .then((data) => {
            document.getElementById("resultado").innerText = data;
          })
          .catch((error) => {
            document.getElementById("resultado").innerText =
              "Error: " + error.message;
          });
      }
    </script>
  </body>
</html>
